<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Web Studio 🕸️</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; }
    h1 { font-size: 3rem; background: linear-gradient(45deg, #4cc9f0, #f72585); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { font-size: 1.2rem; opacity: 0.8; }
    .btn { padding: 12px 30px; border: none; border-radius: 50px; background: linear-gradient(45deg, #4cc9f0, #f72585); color: #0a0a0a; font-weight: 700; cursor: pointer; }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <h1>🕸️ Black Web Studio</h1>
  <p>Your AI-powered development platform is live!</p>
  <button class="btn" onclick="alert('Welcome to Black Web Studio!')">Get Started</button>
</body>
</html>
